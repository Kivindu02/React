      function App(){
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }

         function clearText(){
          setInputText('');
         }
         function exampleText(){
          setInputText('Kivindu');
         }

        return(
          <>
            <input placeholder='Type a name here' onChange={saveInputText}
            value={inputText}
            />
            <button
              onClick={clearText}
            >Reset</button>
            <button
              onClick={exampleText}
            >Example</button>
            <p>Hello {inputText}</p>

            
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
       
    </script>
