<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
      .on-button,.off-button{
        background-color: rgb(25, 135,84);
        color: white;
        border: none;
        padding: 10px;
        border-radius: 3px;
      }
      .off-button{
        background-color: rgb(220, 53, 69);
      }
      
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function App(){
        const [isButtonOn, setIsButtonOn] = React.useState(true);

        function isButtonText(){
          if(isButtonOn){
            setIsButtonOn(false)
          }else{
            setIsButtonOn(true)
          }
 
        }
        
        return(
          <>

            <button
            onClick={isButtonText} 
            className={isButtonOn ? 'on-button': 'off-button'}
            >{isButtonOn ? 'ON': 'OFF'}</button>

            
          </>
        );
      }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
       
    </script>
  </body>
</html>
